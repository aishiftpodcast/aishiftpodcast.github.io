<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Shift Podcast</title>
  <meta name="title" content="Daily AI News Podcast</title>
  <meta name="description" content="Your daily AI news podcast. A new episode every morning." />
  <meta property="og:title" content="AI Shift Podcast" />
  <meta property="og:description" content="Daily AI news. A new episode every morning." />
  <meta property="og:image" content="images/cover.jpg" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700;800&family=Outfit:wght@300;400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  
  <!-- Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            background: '#040616', // Deep indigo from cover
            surface: '#0a0d26',
            surface2: '#13183d',
            accent: {
              DEFAULT: '#00d4ff', // Cyan from light trails
              glow: '#00d4ff40',
            },
            cyan: {
              DEFAULT: '#b058e8', // Purple from cover highlights
              glow: '#b058e840',
            }
          },
          animation: {
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #040616; }
    ::-webkit-scrollbar-thumb { background: #13183d; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00d4ff; }
    
    /* Noise Texture */
    .bg-noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body class="bg-background text-gray-300 font-sans antialiased selection:bg-accent selection:text-white min-h-screen flex flex-col relative pb-24">
  
  <!-- Background Noise -->
  <div class="fixed inset-0 pointer-events-none z-0 bg-noise opacity-50 mix-blend-overlay"></div>

  <!-- ── NAVBAR ──────────────────────────────────────────────────────────── -->
  <nav class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md border-b border-white/5">
    <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-accent to-cyan flex items-center justify-center">
          <i class="ph-fill ph-microphone-stage text-white text-lg"></i>
        </div>
        <span class="font-display font-bold text-xl tracking-wide text-white uppercase">AI <span class="text-accent">Shift</span></span>
      </div>
      <div class="hidden md:flex items-center gap-6 text-sm font-medium">
        <a href="#episodes" class="hover:text-white transition-colors">Episodes</a>
        <a href="#subscribe" class="hover:text-white transition-colors">Platforms</a>
        <a href="#subscribe" class="px-5 py-2.5 rounded-full bg-white text-background hover:bg-gray-200 transition-colors">Subscribe</a>
      </div>
    </div>
  </nav>

  <!-- ── HERO SECTION ────────────────────────────────────────────────────── -->
  <header class="relative z-10 pt-36 pb-20 md:pt-48 md:pb-32 overflow-hidden">
    <!-- Glow effects -->
    <div class="absolute top-1/2 left-1/4 -translate-y-1/2 w-96 h-96 bg-accent-glow blur-[120px] rounded-full pointer-events-none"></div>
    <div class="absolute top-1/2 right-1/4 -translate-y-1/2 w-96 h-96 bg-cyan-glow blur-[120px] rounded-full pointer-events-none"></div>

    <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-[1fr_400px] gap-16 items-center">
      
      <!-- Hero Text -->
      <div class="flex flex-col items-start text-left">
        <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10 text-xs font-semibold tracking-widest uppercase text-cyan mb-6">
          <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan"></span>
          </span>
          Daily Briefing
        </div>
        
        <h1 class="font-display font-bold text-5xl md:text-7xl leading-[1.1] text-white mb-6 uppercase tracking-tight">
          The World's <br/>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-accent via-[#8a2be2] to-cyan">AI News.</span><br/>
          In Brief.
        </h1>
        
        <p class="text-lg md:text-xl text-gray-400 mb-8 max-w-lg leading-relaxed">
          Your daily AI news podcast. A new episode every morning to keep you ahead in the world of technology.
        </p>
      </div>

      <!-- Hero Image -->
      <div class="relative group mx-auto w-full max-w-[360px] md:max-w-none">
        <div class="absolute -inset-1 bg-gradient-to-tr from-accent to-cyan rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200 animate-pulse-slow"></div>
        <img src="images/cover.jpg" alt="AI Shift Podcast Cover" class="relative w-full aspect-square object-cover rounded-2xl shadow-2xl border border-white/10 transition-transform duration-500 group-hover:scale-[1.02]" />
      
      </div>

    </div>
  </header>

  <!-- ── MAIN CONTENT ────────────────────────────────────────────────────── -->
  <main class="relative z-10 py-24" id="episodes">
    <div class="max-w-4xl mx-auto px-6">

      <div class="flex items-center justify-between mb-12">
        <h2 class="font-display text-3xl font-bold text-white flex items-center gap-3">
          <i class="ph ph-list-dashes text-accent"></i> All Episodes
        </h2>
      </div>
<div class="flex flex-wrap gap-3 mb-8">
  <button onclick="filterLanguage('all')" class="lang-filter px-4 py-2 rounded-full bg-accent text-background font-bold text-xs uppercase tracking-widest transition-all">All</button>
  <button onclick="filterLanguage('hindi')" class="lang-filter px-4 py-2 rounded-full bg-surface2 border border-white/10 text-gray-400 font-bold text-xs uppercase tracking-widest hover:border-accent transition-all">Hindi</button>
  <button onclick="filterLanguage('arabic')" class="lang-filter px-4 py-2 rounded-full bg-surface2 border border-white/10 text-gray-400 font-bold text-xs uppercase tracking-widest hover:border-accent transition-all">Arabic</button>
  <button onclick="filterLanguage('korean')" class="lang-filter px-4 py-2 rounded-full bg-surface2 border border-white/10 text-gray-400 font-bold text-xs uppercase tracking-widest hover:border-accent transition-all">Korean</button>
</div>
      <div class="flex flex-col gap-4" id="episode-list">

<div id="player-container">
  <div class="language-section" data-lang="hindi">
    <div id='buzzsprout-player-hindi'></div>
    <script type='text/javascript' charset='utf-8' src='https://www.buzzsprout.com/2615378.js?container_id=buzzsprout-player-hindi&player=large'></script>
  </div>
  

  <div class="language-section" data-lang="arabic">
    <div id='buzzsprout-player-arabic'></div>
    <script type='text/javascript' charset='utf-8' src='https://www.buzzsprout.com/2615698.js?container_id=buzzsprout-player-arabic&player=large'></script>
  
  </div>

  <div class="language-section" data-lang="korean">
    <div id='buzzsprout-player-korean'></div>
    <script type='text/javascript' charset='utf-8' src='https://www.buzzsprout.com/2615646.js?container_id=buzzsprout-player-korean&player=large'></script>
    <!-- <a target="_blank" href="https://open.spotify.com/show/3xWHRdzGzHJjw0O8k1xss8" style="display: inline-block; background-color: #000000; background-image: url(https://www.buzzsprout.com/images/badges/listen-on-embed.svg); background-repeat: no-repeat; border: 1px solid #000000; border-radius: 5px; margin: 0 5px 5px 0; text-indent: -9000px; background-position: 10px -53px; height: 40px; width: 106px;">Listen on Spotify</a> -->
  
  </div>
</div>

        <!-- Empty State -->
      

      </div>
    </div>
  </main>

  <!-- ── FOOTER ──────────────────────────────────────────────────────────── -->
  <footer class="relative z-10 border-t border-white/5 bg-background pt-16 pb-32">
    <div class="max-w-6xl mx-auto px-6">
      <div class="flex flex-col md:flex-row justify-between items-center gap-2">
        <div class="flex items-center gap-2">
          <div class="w-6 h-6 rounded border border-white/20 flex items-center justify-center bg-white/5">
            <i class="ph-fill ph-microphone-stage text-gray-400 text-xs"></i>
          </div>
          <span class="font-display font-bold text-lg text-gray-400 uppercase">AI <span class="text-accent">Shift</span></span>
        </div>
        <p class="text-xs text-gray-500 font-medium text-center md:text-right max-w-sm">
          Auto-published daily.<br/>
          Powered by Gemini + ElevenLabs.
        </p>
      </div>
    </div>
  </footer>

 
<script>
    // This function must be outside the DOMContentLoaded block to be "seen" by onclick attributes
    function filterLanguage(lang) {
      const sections = document.querySelectorAll('.language-section');
      const buttons = document.querySelectorAll('.lang-filter');

      // Toggle Player Visibility
      sections.forEach(section => {
        if (lang === 'all' || section.getAttribute('data-lang') === lang) {
          section.style.display = 'block';
        } else {
          section.style.display = 'none';
        }
      });

      // Update Button Styles
      buttons.forEach(btn => {
        // Clean up text comparison to match 'hindi', 'arabic', 'korean', or 'all'
        const btnText = btn.innerText.toLowerCase().trim();
        if (btnText === lang) {
          btn.classList.add('bg-accent', 'text-background');
          btn.classList.remove('bg-surface2', 'text-gray-400');
        } else {
          btn.classList.remove('bg-accent', 'text-background');
          btn.classList.add('bg-surface2', 'text-gray-400');
        }
      });
    }

    // Logic for the empty state message
    document.addEventListener('DOMContentLoaded', () => {
      const cards = document.querySelectorAll('.episode-card');
      const empty = document.getElementById('empty-msg');
      if (cards.length > 0 && empty) {
        empty.style.display = 'none';
      }
    });
  </script>
</body>
</html>
